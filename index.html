<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="estilo/style.css">
    <link rel="stylesheet" href="estilo/media-query.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
                <!--aqui vai a imagem -->
            </div>
            <div id="formulario">
                <h1>login</h1>
                <p>seja bem-vindo(a) novamente. faça login para acessar sua conta.</p>

                <form action="login.php" method="post" autocomplete="on">
                    <div class="campo">
                        <i class="material-icons">person</i>
                        <i class="material-symbols-outlined">person</i>

                        <input type="email" name="login" id="ilogin" placeholder="seu e-mail" required autocomplete="email">
                        <label for="ilogin">login</label>
                    </div>
                    <div class="campo">
                        <i class="material-icons">vpn_key</i>
                        <i class="material-symbols-outlined">vpn_key</i>

                        <input type="password" name="senha" id="isenha" placeholder="sua senha" required minlength="8" autocomplete="current-password">
                        <label for="isenha">senha</label>

                    </div>
                    <input type="submit" value="entrar">
                    <a href="esqueci.html">
                        esqueci a senha
                        <i class="material-symbols-outlined">mail</i>
                    </a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
